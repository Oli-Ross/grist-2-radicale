services:
  grist-2-radicale:
    image: grist-2-radicale
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:${FLASK_PORT}:${FLASK_PORT}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${FLASK_PORT}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
